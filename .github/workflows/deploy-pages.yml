# Deploy the public/ folder to GitHub Pages so the site shows the app (index.html), not the README.
# In the repo: Settings → Pages → Source must be "GitHub Actions" (not "Deploy from a branch").
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "orlandott", "cursor/goodreads-submission-ui-5f42"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact (site root = contents of public/)
        run: |
          mkdir -p _site
          cp -r public/. _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
